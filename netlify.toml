# Sitio de prueba: build:demo (tope 3 filas, etc.). Entrega operativa del cliente: npm run build
[build]
  publish = "dist"
  command = "npm run build:demo"

# Proxy para evitar CORS con la API pública de VTEX/SBS
[[redirects]]
  from = "/vtex-api/*"
  to = "https://www.sbs.com.ar/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
